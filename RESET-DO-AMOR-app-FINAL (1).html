        localStorage.setItem('reset_diagnostico_dominante', dominant);

        setRitualStep(0);

          setDaySubScreen('ativacao');

          setUnlockedDay(nextDay);

                                : isUnlocked 
                                  ? 'bg-[#2B2118]/10 text-[#2B2118]' 
                                  : 'bg-stone-200 text-stone-400'
                            }`}>
                              {isCompleted ? (
                                <Icon name="check" className="w-5 h-5 stroke-[2.5]" />
                              ) : isUnlocked ? (
                                <Icon name="play" className="w-4 h-4 text-[#2B2118] ml-0.5" fill="currentColor" />
                              ) : (
                                <Icon name="lock" className="w-4 h-4" />
                              )}
                            </div>

                            <div className="space-y-0.5">
                              <div className="flex items-center gap-1.5">
                                <span className="text-[9px] font-bold tracking-widest uppercase text-rose-600">Dia {id}</span>
                                {isCompleted && (
                                  <span className="text-[8px] bg-rose-50 text-rose-700 px-1.5 py-0.2 rounded font-bold uppercase tracking-wider">Concluído</span>
                                )}
                              </div>
                              <h4 className="font-serif text-sm font-bold text-[#2B2118] leading-tight">
                                {day.title.replace(`DIA ${id} — `, "")}
                              </h4>
                              <p className="text-[10px] text-[#2B2118]/60 italic font-medium leading-none mt-0.5">
                                {day.subtitle}
                              </p>
                            </div>
                          </div>

                          <div className="text-[#2B2118]/40 shrink-0">
                            {isUnlocked ? (
                              <Icon name="chevron-right" className="w-5 h-5 text-[#2B2118]" />
                            ) : (
                              <Icon name="lock" className="w-4 h-4" />
                            )}
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* Relatório Final quando os 7 dias estão concluídos */}
                {completedDays.length === 7 && (
                  <div className="bg-[#2B2118] text-white p-6 rounded-2xl space-y-4 shadow-lg border border-rose-500/30 fade-in">
                    <div className="text-center space-y-1">
                      <div className="inline-flex items-center justify-center w-10 h-10 bg-rose-500/20 text-rose-400 rounded-full mb-1">
                        <Icon name="star" className="w-5 h-5" fill="currentColor" />
                      </div>
                      <h4 className="font-serif text-lg font-bold">Você Concluiu o Protocolo!</h4>
                      <p className="text-xs text-[#F7F1E8]/70 leading-normal">
                        As 5 feridas foram nomeadas. Uma armadura foi guardada a cada dia. E, hoje, uma nova identidade começou a ser ativada — uma que não precisa se machucar pra provar valor num relacionamento.
                      </p>
                    </div>

                    <div className="bg-white/10 p-3.5 rounded-xl text-center space-y-2">
                      <p className="font-serif text-xs italic text-[#F7F1E8]">"Toda dor é sintoma. Todo sintoma tem origem. E tem remédio."</p>
                      <span className="font-handwritten text-lg text-rose-400 font-bold block leading-none">- Renata Penko</span>
                    </div>

                    <div className="space-y-2 pt-2">
                      <span className="text-[9px] font-semibold tracking-wider text-[#F7F1E8]/60 uppercase block text-center">Aprofundamento Avançado</span>
                      <a
                        href="https://wa.me/5567981448229?text=Ol%C3%A1+Renata%2C+conclui+o+meu+Protocolo+de+Reidentifica%C3%A7%C3%A3o+e+gostaria+de+saber+mais+sobre+a+Sess%C3%A3o+Individual%21"
                        target="_blank"
                        rel="noreferrer"
                        className="block w-full bg-rose-700 hover:bg-rose-800 text-white text-center py-3 rounded-xl text-xs font-semibold tracking-wide transition-colors"
                      >
                        Agendar Minha Sessão Individual
                      </a>
                      <a
                        href="https://wa.me/5567981448229?text=Ol%C3%A1+Renata%2C+conclui+o+meu+Protocolo+de+Reidentifica%C3%A7%C3%A3o+e+quero+saber+mais+sobre+o+Protocolo+completo%21"
                        target="_blank"
                        rel="noreferrer"
                        className="block w-full bg-white text-[#2B2118] hover:bg-[#F7F1E8] text-center py-3 rounded-xl text-xs font-bold tracking-wide transition-all shadow-sm"
                      >
                        Saber Mais Sobre o Protocolo Completo
                      </a>
                    </div>
                  </div>
                )}

                <div className="pt-6 border-t border-[#D1C7BD]/30 flex justify-between items-center text-xs text-[#2B2118]/40">
                  <button 
                    onClick={handleResetAll}
                    className="hover:text-red-700 transition-colors flex items-center gap-1.5 font-medium"
                  >
                    <Icon name="refresh-cw" className="w-3.5 h-3.5" />
                    Resetar Progresso
                  </button>
                  <p className="text-[10px]">v1.0.1 • Reset do Amor</p>
                </div>
              </div>
            )}

            {/* TELA 5: TRABALHO DO DIA INDIVIDUAL */}
            {screen === 'dia' && selectedDay && (
              <div className="fade-in space-y-5 py-2">
                
                <div className="flex justify-between items-center">
                  <button
                    onClick={() => setScreen('jornada')}
                    className="text-xs font-bold text-[#2B2118]/60 hover:text-[#2B2118] flex items-center gap-1 transition-colors"
                  >
                    <Icon name="chevron-left" className="w-4 h-4" /> Painel
                  </button>
                  <span className="text-xs font-serif italic text-rose-600 font-bold">
                    Dia {selectedDayId} de 7
                  </span>
                </div>

                {/* SUBTELA A: ABERTURA DO DIA */}
                {daySubScreen === 'abertura' && (
                  <div className="space-y-6 fade-in">
                    <div className="text-center space-y-1">
                      <span className="text-[10px] font-bold tracking-wider uppercase text-[#2B2118]/50">Iniciando a Descoberta</span>
                      <h2 className="font-serif text-2xl font-extrabold tracking-tight leading-snug">
                        {selectedDay.title}
                      </h2>
                      <p className="text-xs font-semibold tracking-wider text-rose-600 uppercase">
                        {selectedDay.subtitle}
                      </p>
                    </div>

                    <div className="bg-white border border-[#D1C7BD]/40 p-6 rounded-2xl space-y-4 shadow-sm relative">
                      <p className="text-xs text-[#2B2118]/50 font-bold uppercase tracking-widest block">O Sintoma Clínico</p>
                      <p className="text-sm leading-relaxed text-[#2B2118] italic font-serif">
                        "{selectedDay.abertura}"
                      </p>
                    </div>

                    <div className="bg-amber-50 border border-amber-100 p-4 rounded-xl flex gap-3 items-start">
                      <Icon name="alert-circle" className="w-4.5 h-4.5 text-amber-600 shrink-0 mt-0.5" />
                      <div className="space-y-1">
                        <h5 className="text-xs font-bold text-amber-900 leading-none">Como funciona este dia:</h5>
                        <p className="text-[11px] text-[#2B2118]/70 leading-relaxed">
                          A seguir, você entrará no seu Ritual de Liberação. <strong>Leia cada fala em voz alta, no seu tempo, respirando devagar.</strong>
                        </p>
                      </div>
                    </div>

                    <button
                      onClick={() => setDaySubScreen('ritual')}
                      className="w-full bg-[#2B2118] text-white py-4 rounded-xl font-bold text-xs tracking-wider uppercase hover:bg-[#2B2118]/90 transition-all flex items-center justify-center gap-2 active:scale-95 shadow-md"
                    >
                      Iniciar Ritual de Liberação
                      <Icon name="arrow-right" className="w-4 h-4" />
                    </button>
                  </div>
                )}

                {/* SUBTELA B: RITUAL EM FORMATO "STORIES" */}
                {daySubScreen === 'ritual' && (
                  <div className={`fade-in text-white p-6 md:p-8 rounded-3xl shadow-xl flex flex-col justify-between min-h-[380px] relative overflow-hidden transition-colors duration-500 ${selectedDay.themeColor}`}>
                    
                    <div className="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/40 pointer-events-none"></div>
                    <div className="absolute -right-12 -bottom-12 w-48 h-48 bg-white/5 rounded-full pointer-events-none blur-xl"></div>

                    {/* Barras de progresso fracionadas tipo Instagram Stories */}
                    <div className="w-full flex gap-1 z-10">
                      {selectedDay.ritual.map((_, idx) => (
                        <div 
                          key={idx} 
                          className="flex-grow h-1 rounded-full overflow-hidden bg-white/20"
                        >
                          <div 
                            className={`h-full transition-all duration-300 ${
                              idx < ritualStep 
                                ? 'bg-white' 
                                : idx === ritualStep 
                                  ? 'bg-rose-500 w-full' 
                                  : 'w-0'
                            }`}
                          ></div>
                        </div>
                      ))}
                    </div>

                    {/* Bloco de texto ativo */}
                    <div className="py-8 space-y-4 z-10 flex-grow flex flex-col justify-center text-center">
                      <span className="font-handwritten text-xl text-rose-400 font-bold select-none opacity-90 block">
                        {/\'|"/.test(selectedDay.ritual[ritualStep]) ? "Diga em voz alta:" : "Sinta:"}
                      </span>
                      <p className="font-serif text-base md:text-lg leading-relaxed font-medium transition-all duration-300">
                        {selectedDay.ritual[ritualStep]}
                      </p>
                    </div>

                    {/* Botões de navegação da etapa */}
                    <div className="flex items-center justify-between gap-4 z-10 pt-4 border-t border-white/10">
                      <button
                        onClick={handlePrevRitualStep}
                        className="px-4 py-2 bg-white/5 hover:bg-white/10 active:scale-95 rounded-lg text-xs font-semibold text-white/80 hover:text-white flex items-center gap-1 transition-all"
                      >
                        <Icon name="chevron-left" className="w-4 h-4" /> Anterior
                      </button>

                      <span className="text-[10px] uppercase font-bold tracking-widest text-white/45 select-none">
                        {ritualStep + 1} / {selectedDay.ritual.length}
                      </span>

                      <button
                        onClick={() => handleNextRitualStep(selectedDay.ritual.length)}
                        className="px-5 py-2.5 bg-white text-[#2B2118] font-bold text-xs rounded-lg flex items-center gap-1.5 hover:scale-[1.02] active:scale-95 transition-all shadow-md"
                      >
                        {ritualStep < selectedDay.ritual.length - 1 ? 'Avançar' : 'Prosseguir'} 
                        <Icon name="chevron-right" className="w-4 h-4" />
                      </button>
                    </div>

                    {/* Zonas de clique rápido laterais para ecrãs táteis */}
                    <div className="absolute inset-y-12 left-0 w-12 z-0 cursor-w-resize" onClick={handlePrevRitualStep}></div>
                    <div className="absolute inset-y-12 right-0 w-12 z-0 cursor-e-resize" onClick={() => handleNextRitualStep(selectedDay.ritual.length)}></div>
                  </div>
                )}

                {/* SUBTELA C: FRASE DE ATIVAÇÃO */}
                {daySubScreen === 'ativacao' && (
                  <div className="space-y-6 fade-in text-center">
                    <div className="space-y-1">
                      <span className="text-[10px] font-bold tracking-widest uppercase text-rose-600 block">Ativação de Poder</span>
                      <h3 className="font-serif text-xl font-bold text-[#2B2118]">Declare com sua voz no presente:</h3>
                    </div>

                    <div className="bg-white border-2 border-rose-600/30 p-8 rounded-3xl shadow-md relative overflow-hidden flex flex-col justify-center items-center min-h-[160px]">
                      <div className="absolute -left-4 -top-4 w-12 h-12 bg-rose-50 rounded-full opacity-60"></div>
                      <p className="font-handwritten text-3xl font-extrabold text-[#2B2118] relative z-10 leading-snug px-3">
                        "{selectedDay.ativacao}"
                      </p>
                    </div>

                    <div className="space-y-3 pt-2">
                      <button
                        onClick={() => setDaySubScreen('fechamento')}
                        className="w-full bg-[#2B2118] text-white py-4 rounded-xl font-bold text-xs tracking-wider uppercase hover:bg-[#2B2118]/90 transition-all flex items-center justify-center gap-2 active:scale-95 shadow-md"
                      >
                        Ativado. Próximo Passo.
                        <Icon name="arrow-right" className="w-4 h-4" />
                      </button>
                      <button
                        onClick={() => setDaySubScreen('ritual')}
                        className="text-xs text-[#2B2118]/60 hover:text-[#2B2118] underline transition-colors block mx-auto"
                      >
                        Repetir Ritual de Liberação
                      </button>
                    </div>
                  </div>
                )}

                {/* SUBTELA D: FECHAMENTO DO DIA */}
                {daySubScreen === 'fechamento' && (
                  <div className="space-y-6 fade-in">
                    <div className="text-center space-y-1">
                      <span className="text-[10px] font-bold tracking-wider uppercase text-emerald-600 block">Jornada do dia Completa</span>
                      <h3 className="font-serif text-2xl font-extrabold tracking-tight">O que fica hoje</h3>
                    </div>

                    <div className="bg-white border border-[#D1C7BD]/40 p-6 rounded-2xl space-y-4 shadow-sm relative">
                      <p className="text-sm leading-relaxed text-[#2B2118] italic">
                        "{selectedDay.fechamento}"
                      </p>
                    </div>

                    <button
                      onClick={() => handleCompleteDay(selectedDayId)}
                      className="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold text-xs tracking-wider uppercase hover:bg-emerald-700 transition-all flex items-center justify-center gap-2 active:scale-95 shadow-md"
                    >
                      <Icon name="check-circle" className="w-4.5 h-4.5" />
                      Concluir Dia {selectedDayId}
                    </button>
                  </div>
                )}

              </div>
            )}

          </main>

          {/* Rodapé Fixo */}
          <footer className="p-5 bg-[#2B2118] text-white/50 text-center text-xs space-y-1 mt-6 border-t border-white/5">
            <p className="font-serif font-medium tracking-wide text-white/80">Reset do Amor • Protocolo de Reidentificação</p>
            <p className="text-[10px] text-white/40">Desenvolvido clinicamente sob a supervisão de Renata Penko Maximiliano</p>
          </footer>

        </div>
      );
    }

    // Inicialização da aplicação React
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
